<!DOCTYPE html>
<html>
<head>
  <title>Login 🎬</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0f0f1a; color:white;
           font-family:Arial; display:flex;
           justify-content:center; align-items:center;
           height:100vh; }
    .box { background:#1a1a2e; padding:40px;
           border-radius:16px; width:320px;
           border:1px solid #333; text-align:center; }
    h1 { color:#e50914; font-size:2em; margin-bottom:5px; }
    p  { color:#aaa; margin-bottom:25px; font-size:0.9em; }
    input { width:100%; padding:12px; margin:8px 0;
            background:#0f0f1a; border:1px solid #444;
            border-radius:8px; color:white; font-size:1em; }
    input:focus { border-color:#e50914; outline:none; }
    button { width:100%; padding:12px; background:#e50914;
             border:none; border-radius:8px; color:white;
             font-size:1em; font-weight:bold;
             cursor:pointer; margin-top:10px; }
    button:hover { background:#b30710; }
    .error { color:#ff6b6b; margin-top:15px; font-size:0.9em; }
    .hint  { color:#555; margin-top:20px; font-size:0.8em; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🎬</h1>
    <h1>MOVIE LIST</h1>
    <p>Sign in to continue</p>
    <form method="POST">
      <input type="text"     name="username" placeholder="Username" required/>
      <input type="password" name="password" placeholder="Password" required/>
      <button type="submit">LOGIN →</button>
    </form>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <p class="hint">Try: admin / 1234</p>
  </div>
</body>
</html>
