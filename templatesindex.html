<!DOCTYPE html>
<html>
<head>
  <title>🎬 Movie List</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0f0f1a; color:white; font-family:Arial; }
    header { background:#e50914; padding:20px; text-align:center; }
    h1 { font-size:2.5em; letter-spacing:3px; }
    .subtitle { color:#ffcdd2; margin-top:5px; }
    .grid { display:flex; flex-wrap:wrap; justify-content:center;
            gap:20px; padding:40px; }
    .card { background:#1a1a2e; border:1px solid #333;
            border-radius:12px; padding:30px; width:200px;
            text-align:center; transition:0.3s; cursor:pointer; }
    .card:hover { background:#e50914; transform:scale(1.08);
                  border-color:#e50914; }
    .emoji { font-size:3em; }
    .name  { font-size:1.2em; font-weight:bold; margin:10px 0 5px; }
    .year  { color:#aaa; font-size:0.9em; }
    footer { text-align:center; padding:20px; color:#555; }
  </style>
</head>
<body>
  <header>
    <h1>🎬 MOVIE LIST</h1>
    <p class="subtitle">Built with Jenkins + Docker + AWS</p>
  </header>
  <div class="grid">
    {% for movie in movies %}
    <div class="card">
      <div class="emoji">{{ movie.emoji }}</div>
      <div class="name">{{ movie.name }}</div>
      <div class="year">📅 {{ movie.year }}</div>
    </div>
    {% endfor %}
  </div>
  <footer>Deployed via CI/CD Pipeline on AWS ECR ☁️</footer>
</body>
</html>
